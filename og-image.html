<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Egan Property Maintenance — OG Image</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@500&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; }
  body {
    width: 1200px;
    height: 630px;
    background: #1B3A2D;
    font-family: 'DM Sans', sans-serif;
    color: #C9A84C;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .frame {
    position: absolute;
    inset: 36px;
    border: 1.5px solid #C9A84C;
    pointer-events: none;
  }
  .mark {
    font-family: 'Playfair Display', 'Georgia', serif;
    font-size: 188px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: 0.04em;
    color: #C9A84C;
    margin: 0;
  }
  .sub {
    margin-top: 18px;
    font-size: 26px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: #C9A84C;
    font-weight: 500;
  }
  .divider {
    width: 64px;
    height: 1.5px;
    background: #C9A84C;
    opacity: 0.55;
    margin: 38px 0 0;
  }
  .footer {
    position: absolute;
    bottom: 70px;
    left: 0; right: 0;
    text-align: center;
    font-size: 22px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #C9A84C;
    font-weight: 500;
  }
</style>
</head>
<body>
  <div class="frame"></div>
  <h1 class="mark">EGAN</h1>
  <div class="sub">Property Maintenance</div>
  <div class="divider"></div>
  <div class="footer">East Granby, CT &nbsp;|&nbsp; (860) 999-3161</div>
</body>
</html>
